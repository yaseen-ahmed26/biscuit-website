<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/global.css">
</head>
<body>
    <header>
        <h2 class="logo">Biscuit</h2>
        <nav class="navigation">
            <button class="action-btn" id="action-btn">Register</button>
        </nav>
    </header>

    <div class="wrapper">
        <div class="card-1" id="login-card">
            <h2>Login</h2>
            <form action="#">
                <div class="input-box">
                    <span class="icon"><ion-icon name="mail"></ion-icon></span>
                    <input type="email" required id="login-email">
                    <label>Email</label>
                </div>
                 <div class="input-box">
                    <span class="icon"><ion-icon name="eye"></ion-icon></span>
                    <input type="password" required id="login-password">
                    <label>Password</label>
                </div>
                <button type="submit" class="final-btn" id="login-btn">Log in</button>
            </form>
        </div>
    </div>

    <script tpye="module" src="js/index.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.js"></script>
</body>
</html>
