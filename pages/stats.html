<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stats</title>
    <link rel="stylesheet" href="../css/global.css">
</head>
<body>
    <header>
        <h2 class="logo">Biscuit</h2>
        <nav class="navigation">
            <a href="stats.html">Game Stats</a>
            <a href="code.html">Link Game</a>
            <a href="account.html">Account Details</a>
            <a href="delete.html">Delete Account</a>
            <button class="action-btn" id="action-btn">Log out</button>
        </nav>
    </header>

    <div class="wrapper">
        <div class="card-1" id="register-card">
            <h2>Game Stats</h2>
            <p id="description">View your lifetime game stats.</p>
            <div class="display-box">
                <p id="lifetime-biscuits">Lifetime Biscuits: 1000</p>

            <div class="display-box">
                <p id="lifetime-playtime">Lifetime Playtime: 5000</p>
            </div>
            <div class="display-box">
                <p id="lifetime-clicks">Lifetime Clicks: 100</p>
            </div>
            <button class="final-btn" id="refresh-btn">Refresh</button>
        </div>
    </div>

    <script type="module" src="../js/stats.js"></script>
</div>

</html>
