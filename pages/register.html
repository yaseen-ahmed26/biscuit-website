<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="../css/global.css">
</head>
<body>
    <header>
        <h2 class="logo">Biscuit</h2>
        <nav class="navigation">
            <button class="action-btn" id="action-btn">Log in</button>
        </nav>
    </header>

    <div class="wrapper">
        <div class="card">
            <h2>Register</h2>
            <p id="description">Create an account and connect your Biscuit game data.</p>
            <form action="#">
                <div class="input-box">
                    <span class="icon"><ion-icon name="person"></ion-icon></span>
                    <input type="text" required id="username">
                    <label>Username</label>
                </div>
                <div class="input-box">
                    <span class="icon"><ion-icon name="mail"></ion-icon></span>
                    <input type="email" required id="email">
                    <label>Email</label>
                </div>
                <div class="input-box">
                    <span class="icon"><ion-icon name="eye"></ion-icon></span>
                    <input type="password" required id="password">
                    <label>Enter Password</label>
                </div>
                <div class="input-box">
                    <span class="icon"><ion-icon name="eye"></ion-icon></span>
                    <input type="password" required id="confirm-password">
                    <label>Confirm Password</label>
                </div>
                <button type="submit" class="final-btn" id="register-btn">Create</button>
            </form>
        </div>
    </div>

    <script type="module" src="../js/register.js"></script>
</div>
</body>
</html>
