<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account</title>
    <link rel="stylesheet" href="../css/global.css">
</head>
<body>
    <header>
        <h2 class="logo">Biscuit</h2>
        <nav class="navigation">
            <a href="account.html">Account</a>
            <a href="code.html">Login with Code</a>
            <button class="action-btn" id="action-btn">Log out</button>
        </nav>
    </header>

    <div class="wrapper">
        <div class="card-1" id="register-card">
            <h2>Account</h2>
            <div class="input-box">
                <input type="text" required id="update-username">
                <label id="username-label">username.here</label>
            </div>
            <div class="input-box">
                <input type="email" required id="update-email">
                <label id="email-label">user@example.com</label>
            </div>
            <div class="input-box">
                <input type="text" required id="update-password">
                <label id="password-label">New Password</label>
            </div>
            <div class="input-box">
                <input type="password" required id="current-password">
                <label id="current-password-label">Enter Current Password</label>
            </div>
            <button class="final-btn" id="update-btn">Update</button>
        </div>
    </div>

    <script type="module" src="../js/account.js"></script>
</div>
</body>
</html>
